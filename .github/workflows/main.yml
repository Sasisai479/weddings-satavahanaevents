name: Deploy SPA to Hostinger (FTPS)

on:
push:
branches:
- main

workflow_dispatch:

jobs:
build:
name: Build SPA
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 22

  - name: Install dependencies
    run: npm install

  - name: Build SPA
    run: npm run build

  - name: Resolve SPA output directory
    id: resolve
    run: |
      if [ -f "dist/client/index.html" ]; then
        echo "dir=dist/client" >> $GITHUB_OUTPUT
      elif [ -f ".output/public/index.html" ]; then
        echo "dir=.output/public" >> $GITHUB_OUTPUT
      elif [ -f "dist/index.html" ]; then
        echo "dir=dist" >> $GITHUB_OUTPUT
      else
        echo "Could not locate build output"
        exit 1
      fi

  - name: Stage deploy directory
    run: |
      mkdir -p deploy
      cp -r ${{ steps.resolve.outputs.dir }}/. deploy/

      cat > deploy/.htaccess << 'EOF'
      Options -MultiViews
      RewriteEngine On

      RewriteCond %{REQUEST_FILENAME} -f [OR]
      RewriteCond %{REQUEST_FILENAME} -d
      RewriteRule ^ - [L]

      RewriteRule ^ index.html [L]

      <IfModule mod_headers.c>
        <FilesMatch "\.(js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|avif|ico)$">
          Header set Cache-Control "public, max-age=31536000, immutable"
        </FilesMatch>

        <FilesMatch "index\.html$">
          Header set Cache-Control "no-cache, no-store, must-revalidate"
        </FilesMatch>
      </IfModule>
      EOF

  - name: Verify build output
    run: |
      echo "Deploy contents:"
      find deploy -type f | sort

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: spa-deploy
      path: deploy/
```

deploy:
name: Deploy to Hostinger (FTPS)
runs-on: ubuntu-latest
needs: build

```
steps:
  - name: Download artifact
    uses: actions/download-artifact@v4
    with:
      name: spa-deploy
      path: deploy/

  - name: Deploy to Hostinger
    uses: SamKirkland/FTP-Deploy-Action@v4.3.5
    with:
      server: ${{ secrets.FTP_SERVER }}
      username: ${{ secrets.FTP_USERNAME }}
      password: ${{ secrets.FTP_PASSWORD }}
      protocol: ftps
      port: 21
      local-dir: deploy/
      server-dir: /public_html/
      dangerous-clean-slate: false
      log-level: verbose
```
